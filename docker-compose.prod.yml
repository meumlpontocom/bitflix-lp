name: bitflix-lp-prod

# Compose prod do Bitflix LP — roda em tomahawk.
#
# Diferenças vs docker-compose.yml (staging):
#  - Sem service postgres (DB externo na VM 192.168.14.20:6432)
#  - App usa Dockerfile.prod (multi-stage build, pnpm build + pnpm start)
#  - Sem bind-mount de source (.next/node_modules ficam dentro da imagem)
#  - container_name e network com sufixo -prod- pra coexistir caso necessário
#  - Expõe porta 127.0.0.1:3060 (não 3023)
#  - MinIO console expõe 127.0.0.1:9001 (proxied via nginx minio.cms.bitflix.com.br)
#  - restart: always (não unless-stopped)
#
# Invocação:
#   docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build

networks:
  bitflix-lp-prod-net:
    driver: bridge

volumes:
  bitflix_lp_prod_minio_data:

services:
  bitflix-lp-prod-minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: bitflix-lp-prod-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER obrigatorio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD obrigatorio}
      MINIO_BROWSER_REDIRECT_URL: https://minio.cms.bitflix.com.br
    volumes:
      - bitflix_lp_prod_minio_data:/data
    ports:
      - "127.0.0.1:9001:9001"
    networks:
      - bitflix-lp-prod-net
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  bitflix-lp-prod-mc-init:
    image: minio/mc:latest
    container_name: bitflix-lp-prod-mc-init
    depends_on:
      bitflix-lp-prod-minio:
        condition: service_healthy
    networks:
      - bitflix-lp-prod-net
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-bitflix_lp_app}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY obrigatorio}
      S3_BUCKET: ${S3_BUCKET:-bitflix-lp-media}
    entrypoint: >
      /bin/sh -c "
      set -e;
      mc alias set local http://bitflix-lp-prod-minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing local/$$S3_BUCKET;
      (mc admin user info local $$S3_ACCESS_KEY > /dev/null 2>&1 || mc admin user add local $$S3_ACCESS_KEY $$S3_SECRET_KEY);
      mc admin policy attach local readwrite --user $$S3_ACCESS_KEY || true;
      echo 'bitflix-lp-prod minio bootstrap done';
      "
    restart: "no"

  bitflix-lp-prod-app:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        DATABASE_URI: ${DATABASE_URI}
        PAYLOAD_SECRET: ${PAYLOAD_SECRET}
    container_name: bitflix-lp-prod-app
    restart: always
    depends_on:
      bitflix-lp-prod-minio:
        condition: service_healthy
    environment:
      DATABASE_URI: ${DATABASE_URI:?DATABASE_URI obrigatorio}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:?PAYLOAD_SECRET obrigatorio}
      PAYLOAD_PUBLIC_SERVER_URL: ${PAYLOAD_PUBLIC_SERVER_URL:?PAYLOAD_PUBLIC_SERVER_URL obrigatorio}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?NEXT_PUBLIC_SITE_URL obrigatorio}
      S3_ENDPOINT: http://bitflix-lp-prod-minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-bitflix_lp_app}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-bitflix-lp-media}
      S3_REGION: ${S3_REGION:-us-east-1}
      BLOG_IMPORT_TOKEN: ${BLOG_IMPORT_TOKEN}
      UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID:-}
      UMAMI_SCRIPT_URL: ${UMAMI_SCRIPT_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
    ports:
      - "127.0.0.1:3060:3000"
    networks:
      - bitflix-lp-prod-net
