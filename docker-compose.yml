name: bitflix-lp

networks:
  bitflix-lp-net:
    driver: bridge

volumes:
  bitflix_lp_pg_data:
  bitflix_lp_minio_data:
  bitflix_lp_node_modules:
  bitflix_lp_next_cache:

services:
  bitflix-lp-postgres:
    image: postgres:17
    container_name: bitflix-lp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bitflix_lp}
      POSTGRES_USER: ${POSTGRES_USER:-bitflix_lp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatorio}
    volumes:
      - bitflix_lp_pg_data:/var/lib/postgresql/data
    networks:
      - bitflix-lp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bitflix_lp} -d ${POSTGRES_DB:-bitflix_lp}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  bitflix-lp-minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: bitflix-lp-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER obrigatorio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD obrigatorio}
    volumes:
      - bitflix_lp_minio_data:/data
    networks:
      - bitflix-lp-net
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  bitflix-lp-mc-init:
    image: minio/mc:latest
    container_name: bitflix-lp-mc-init
    depends_on:
      bitflix-lp-minio:
        condition: service_healthy
    networks:
      - bitflix-lp-net
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-bitflix_lp_app}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY obrigatorio}
      S3_BUCKET: ${S3_BUCKET:-bitflix-lp-staging-media}
    entrypoint: >
      /bin/sh -c "
      set -e;
      mc alias set local http://bitflix-lp-minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing local/$$S3_BUCKET;
      mc anonymous set download local/$$S3_BUCKET || true;
      (mc admin user info local $$S3_ACCESS_KEY > /dev/null 2>&1 || mc admin user add local $$S3_ACCESS_KEY $$S3_SECRET_KEY);
      mc admin policy attach local readwrite --user $$S3_ACCESS_KEY || true;
      echo 'minio bootstrap done';
      "
    restart: "no"

  bitflix-lp-app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: bitflix-lp-app
    restart: unless-stopped
    depends_on:
      bitflix-lp-postgres:
        condition: service_healthy
      bitflix-lp-minio:
        condition: service_healthy
    environment:
      DATABASE_URI: postgres://${POSTGRES_USER:-bitflix_lp}:${POSTGRES_PASSWORD}@bitflix-lp-postgres:5432/${POSTGRES_DB:-bitflix_lp}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:?PAYLOAD_SECRET obrigatorio}
      PAYLOAD_PUBLIC_SERVER_URL: ${PAYLOAD_PUBLIC_SERVER_URL:-http://localhost:3023}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3023}
      S3_ENDPOINT: http://bitflix-lp-minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-bitflix_lp_app}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-bitflix-lp-staging-media}
      S3_REGION: ${S3_REGION:-us-east-1}
      BLOG_IMPORT_TOKEN: ${BLOG_IMPORT_TOKEN:-}
      UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID:-}
      UMAMI_SCRIPT_URL: ${UMAMI_SCRIPT_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
    volumes:
      - .:/app
      - bitflix_lp_node_modules:/app/node_modules
      - bitflix_lp_next_cache:/app/.next
    ports:
      - "127.0.0.1:3023:3000"
    networks:
      - bitflix-lp-net
    command: pnpm dev
