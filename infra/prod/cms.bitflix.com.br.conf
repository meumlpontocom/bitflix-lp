# cms.bitflix.com.br — admin Payload prod
# HTTP-only stub. Certbot --nginx injeta o bloco 443 (SSL) automaticamente após emitir cert.
# Reverse proxy → 127.0.0.1:3060 (mesmo container; middleware Next roteia por hostname).

server {
    listen 80;
    listen [::]:80;
    server_name cms.bitflix.com.br;

    add_header X-Robots-Tag "noindex, nofollow" always;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3060;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}
