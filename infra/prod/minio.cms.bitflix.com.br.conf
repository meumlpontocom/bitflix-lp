# minio.cms.bitflix.com.br — MinIO console (admin UI)
# HTTP-only stub. Certbot --nginx injeta o bloco 443 (SSL) automaticamente após emitir cert.
# Reverse proxy → 127.0.0.1:9001 (MinIO console do compose bitflix-lp-prod-minio).
# Login com MINIO_ROOT_USER + MINIO_ROOT_PASSWORD do .env.production.

server {
    listen 80;
    listen [::]:80;
    server_name minio.cms.bitflix.com.br;

    add_header X-Robots-Tag "noindex, nofollow" always;

    # MinIO console aceita uploads grandes via UI
    client_max_body_size 1024m;

    # Headers necessários pro console funcionar bem atrás de proxy
    chunked_transfer_encoding off;

    location / {
        proxy_pass http://127.0.0.1:9001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin '';
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 86400;
    }
}
