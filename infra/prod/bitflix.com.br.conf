# bitflix.com.br + www.bitflix.com.br — site público prod
# HTTP-only stub. Certbot --nginx injeta o bloco 443 (SSL) automaticamente após emitir cert.
# Reverse proxy → 127.0.0.1:3060 (compose service bitflix-lp-prod-app).
# Middleware Next roteia por hostname (apex/www = site público; cms = admin).

server {
    listen 80;
    listen [::]:80;
    server_name bitflix.com.br www.bitflix.com.br;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3060;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}
